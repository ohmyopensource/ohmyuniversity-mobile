# ================================
# OhMyUniversity! - Mobile
# ================================

name: ohmyuniversity
description: "OhMyUniversity! mobile app from OhMyOpenSource!"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

# ================================
# Dependencies
# ================================
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation ================================
  go_router: ^17.2.3

  # State Management + DI ================================
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Network ================================
  dio: ^5.8.0+1

  # Auth SSO ================================
  flutter_appauth: ^12.0.0
  flutter_secure_storage: ^10.1.0

  # Models ================================
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Utils ================================
  url_launcher: ^6.3.1

  # Environment ================================
  envied: ^1.3.5

  # UI - Calendar ================================
  kalender: ^0.18.5

  # UI - Graphs ================================
  fl_chart: ^1.2.0

  # UI - Timeline ================================
  timelines_plus: ^2.0.0

  # UI - Loading ================================
  skeletonizer: ^2.1.3

  # UI - List Interactions ================================
  flutter_slidable: ^4.0.3

  # UI - Toast / Snackbar ================================
  toastification: ^3.2.0

  # UI - Animations ================================
  animations: ^2.0.11
  lucide_icons: ^0.257.0
  google_fonts: ^8.1.0
  lottie: ^3.3.1
  flutter_svg:


# ================================
# Dev Dependencies
# ================================
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen ================================
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  freezed: ^3.2.3
  json_serializable: ^6.9.5
  envied_generator: ^1.3.4
  custom_lint: ^0.8.1

  # Test ================================
  mockito: ^5.4.5

# ================================
# Flutter Config
# ================================
flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/animations/
    - assets/animations/onboarding/
    - assets/animations/orientation/
